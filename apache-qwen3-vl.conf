# Qwen3-VL Web Service - Apache reverse proxy 설정
#
# 적용 위치: /etc/apache2/sites-available/atpia.com-le-ssl.conf
# DirectoryIndex 줄 아래에 아래 블록을 삽입한다.
#
# 필요 모듈 활성화:
#   sudo a2enmod proxy proxy_http headers
#
# 설정 적용:
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#
# 외부 접속 URL: https://atpia.com/qwen3-vl/index.html

# ── Qwen3-VL FastAPI (uvicorn @ 127.0.0.1:8001) ──────────────────────────────
ProxyPreserveHost On

# 이미지 포함 요청 본문 최대 크기: 15 MB
# (클라이언트 10 MB 제한 + base64 인코딩 오버헤드 약 33% 여유)
LimitRequestBody 15728640

# 이미지 분석에 걸리는 시간을 고려해 프록시 타임아웃을 넉넉히 설정
ProxyTimeout 185

ProxyPass        /qwen3-vl/ http://127.0.0.1:8001/ flushpackets=on
ProxyPassReverse /qwen3-vl/ http://127.0.0.1:8001/
# ─────────────────────────────────────────────────────────────────────────────
#
# flushpackets=on  : SSE 스트리밍 응답 시 Apache 버퍼링을 비활성화한다.
# ProxyPreserveHost: 원본 Host 헤더를 FastAPI로 전달한다.
# LimitRequestBody : base64 이미지가 포함된 큰 JSON 요청을 허용한다.
# ProxyTimeout     : uvicorn REQUEST_TIMEOUT(180s)보다 5초 크게 설정한다.
